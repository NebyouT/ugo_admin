services:
  - type: web
    name: ugo-admin
    env: node
    plan: free
    buildCommand: "npm install"
    startCommand: "node server.js"
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false # Set this in Render dashboard
      - key: JWT_SECRET
        generateValue: true
        length: 32
    autoDeploy: true
    
databases:
  - name: ugo-mongodb
    databaseName: ugo
    user: ugo-admin

paths:
  /api/auth/register:
    post:
      tags:
        - Authentication
      summary: Register new user (parent/driver)
      description: Register a new user with phone number and OTP verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_type
                - full_name
                - phone
                - password
                - confirm_password
              properties:
                user_type:
                  type: string
                  enum: [parent, student, driver, admin, employee]
                  example: parent
                  description: User type for registration
                full_name:
                  type: string
                  example: John Doe
                  description: Full name (will be split into first and last name)
                phone:
                  type: string
                  example: "+251911234567"
                  description: Phone number (primary identifier)
                password:
                  type: string
                  example: SecurePass123
                  minLength: 8
                  description: Password (minimum 8 characters)
                confirm_password:
                  type: string
                  example: SecurePass123
                  description: Password confirmation (must match password)
                device_info:
                  type: object
                  description: Device information (optional)
                  properties:
                    platform:
                      type: string
                      example: web
                    version:
                      type: string
                      example: 1.0.0
                    deviceId:
                      type: string
                      example: device_12345
                    fcmToken:
                      type: string
                      example: firebase_push_token
      responses:
        201:
          description: User registered successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: OTP sent to your phone
                  data:
                    type: object
                    properties:
                      user_id:
                        type: string
                        example: "69c534cddc08a51cee237a90"
                        description: Newly created user ID
                      phone:
                        type: string
                        example: "+251911234567"
                        description: Registered phone number
                      otp_expires_in:
                        type: integer
                        example: 300
                        description: OTP expiration time in seconds (5 minutes)
                      requires_verification:
                        type: boolean
                        example: true
                        description: Whether phone verification is required
        400:
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/login:
    post:
      tags:
        - Authentication
      summary: Login user
      description: Login with phone number and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
                - password
              properties:
                phone:
                  type: string
                  example: "+251911234567"
                password:
                  type: string
                  example: SecurePass123
                deviceInfo:
                  type: object
                  properties:
                    deviceId:
                      type: string
                    deviceType:
                      type: string
                    fcmToken:
                      type: string
      responses:
        200:
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Login successful
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          id:
                            type: string
                            example: "69c534cddc08a51cee237a90"
                          full_name:
                            type: string
                            example: "Test User"
                          phone:
                            type: string
                            example: "+251911234567"
                          user_type:
                            type: string
                            example: "parent"
                          photo:
                            type: string
                            nullable: true
                            example: null
                          status:
                            type: string
                            example: "active"
                          created_at:
                            type: string
                            format: date-time
                            example: "2026-03-26T13:29:49.977Z"
                      tokens:
                        type: object
                        properties:
                          access_token:
                            type: string
                            example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                          refresh_token:
                            type: string
                            example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                          expires_in:
                            type: integer
                            example: 3600
                            description: Token expiration time in seconds
                          token_type:
                            type: string
                            example: "Bearer"
                      children_count:
                        type: integer
                        example: 0
                        description: Number of children associated with this parent
                      active_subscriptions:
                        type: integer
                        example: 0
                        description: Number of active subscriptions
                      has_pending_payments:
                        type: boolean
                        example: false
                        description: Whether user has pending payments
        401:
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/verify-otp:
    post:
      tags:
        - Authentication
      summary: Verify OTP
      description: Verify phone number with OTP code. For testing, OTP is hardcoded to "123456"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
                - otp
              properties:
                phone:
                  type: string
                  example: "+251911234567"
                otp:
                  type: string
                  example: "123456"
      responses:
        200:
          description: Phone number verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Phone verified successfully
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          id:
                            type: string
                            example: "69c534cddc08a51cee237a90"
                          full_name:
                            type: string
                            example: "Test User"
                          phone:
                            type: string
                            example: "+251911234567"
                          user_type:
                            type: string
                            example: "parent"
                          status:
                            type: string
                            example: "active"
                      tokens:
                        type: object
                        properties:
                          access_token:
                            type: string
                            example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                          refresh_token:
                            type: string
                            example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                          expires_in:
                            type: integer
                            example: 3600
                            description: Token expiration time in seconds
                          token_type:
                            type: string
                            example: "Bearer"
                      next_step:
                        type: string
                        example: "add_child"
                        description: Next recommended step for the user
        400:
          description: Invalid OTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/resend-otp:
    post:
      tags:
        - Authentication
      summary: Resend OTP
      description: Resend OTP code to phone number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
              properties:
                phone:
                  type: string
                  example: "+251911234567"
      responses:
        200:
          description: OTP sent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        400:
          description: Error sending OTP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/forgot-password:
    post:
      tags:
        - Authentication
      summary: Forgot password
      description: Request password reset OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
              properties:
                phone:
                  type: string
                  example: "+251911234567"
      responses:
        200:
          description: Reset OTP sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        404:
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/reset-password:
    post:
      tags:
        - Authentication
      summary: Reset password
      description: Reset password with OTP verification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
                - otp
                - newPassword
              properties:
                phone:
                  type: string
                  example: "+251911234567"
                otp:
                  type: string
                  example: "123456"
                newPassword:
                  type: string
                  example: NewSecurePass123
      responses:
        200:
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        400:
          description: Invalid OTP or validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/refresh-token:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      description: Get new access token using refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
      responses:
        200:
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                      refreshToken:
                        type: string
        401:
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/me:
    get:
      tags:
        - Authentication
      summary: Get current user
      description: Get authenticated user profile
      security:
        - bearerAuth: []
      responses:
        200:
          description: User profile retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout user
      description: Logout and invalidate tokens
      security:
        - bearerAuth: []
      responses:
        200:
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/change-password:
    post:
      tags:
        - Authentication
      summary: Change password
      description: Change password for authenticated user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                  example: OldPass123
                newPassword:
                  type: string
                  example: NewPass123
      responses:
        200:
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        400:
          description: Invalid current password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/account:
    delete:
      tags:
        - Authentication
      summary: Delete account
      description: Delete user account (soft delete)
      security:
        - bearerAuth: []
      responses:
        200:
          description: Account deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

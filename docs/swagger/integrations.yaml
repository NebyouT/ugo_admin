paths:
  /api/integrations:
    get:
      tags:
        - Integrations
      summary: Get all integrations
      description: Get all third-party integrations
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: type
          schema:
            type: string
            enum: [sms_gateway, map_api, payment_gateway, push_notification, email_config, storage, other]
          description: Filter by integration type
        - in: query
          name: active
          schema:
            type: boolean
          description: Filter by active status
      responses:
        200:
          description: Integrations retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      integrations:
                        type: array
                        items:
                          type: object
                          properties:
                            _id:
                              type: string
                            keyName:
                              type: string
                              example: google_maps
                            settingsType:
                              type: string
                              example: map_api
                            isActive:
                              type: boolean
                              example: true
                            mode:
                              type: string
                              enum: [test, live]
                              example: live
                      total:
                        type: integer
                        example: 5
        401:
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/integrations/{keyName}:
    get:
      tags:
        - Integrations
      summary: Get integration by key
      description: Get specific integration details
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: keyName
          required: true
          schema:
            type: string
          description: Integration key name
          example: google_maps
      responses:
        200:
          description: Integration retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      integration:
                        type: object
                        properties:
                          _id:
                            type: string
                          keyName:
                            type: string
                            example: google_maps
                          settingsType:
                            type: string
                            example: map_api
                          isActive:
                            type: boolean
                            example: true
                          mode:
                            type: string
                            example: live
        404:
          description: Integration not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Integrations
      summary: Update integration
      description: Update integration configuration
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: keyName
          required: true
          schema:
            type: string
          description: Integration key name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                isActive:
                  type: boolean
                mode:
                  type: string
                  enum: [test, live]
                testValues:
                  type: object
                liveValues:
                  type: object
      responses:
        200:
          description: Integration updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        404:
          description: Integration not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Integrations
      summary: Delete integration
      description: Delete integration configuration
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: keyName
          required: true
          schema:
            type: string
          description: Integration key name
      responses:
        200:
          description: Integration deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        404:
          description: Integration not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/integrations/{keyName}/status:
    patch:
      tags:
        - Integrations
      summary: Update integration status
      description: Activate or deactivate integration
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: keyName
          required: true
          schema:
            type: string
          description: Integration key name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - isActive
              properties:
                isActive:
                  type: boolean
                  example: true
      responses:
        200:
          description: Status updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        404:
          description: Integration not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/integrations/{keyName}/test:
    post:
      tags:
        - Integrations
      summary: Test integration
      description: Test integration configuration
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: keyName
          required: true
          schema:
            type: string
          description: Integration key name
      responses:
        200:
          description: Test completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      status:
                        type: string
                        enum: [success, failed, warning]
                        example: success
                      message:
                        type: string
                        example: Integration is working correctly
                      details:
                        type: object
        404:
          description: Integration not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/integrations/google-maps/geocode:
    get:
      tags:
        - Integrations
      summary: Geocode address
      description: Convert address to coordinates using Google Maps API
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: address
          required: true
          schema:
            type: string
          description: Address to geocode
          example: Bole Road, Addis Ababa, Ethiopia
      responses:
        200:
          description: Geocoding completed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      address:
                        type: string
                        example: Bole Road, Addis Ababa, Ethiopia
                      coordinates:
                        type: object
                        properties:
                          latitude:
                            type: number
                            example: 9.0192
                          longitude:
                            type: number
                            example: 38.7525
                      results:
                        type: array
                        items:
                          type: object
        400:
          description: Missing address parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        404:
          description: Address not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: ADDRESS_NOT_FOUND
                      message:
                        type: string
                        example: No results found for this address
        500:
          description: Geocoding failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/integrations/google-maps/api-key:
    get:
      tags:
        - Integrations
      summary: Get Google Maps API key
      description: Get Google Maps API key for client-side usage
      security:
        - bearerAuth: []
      responses:
        200:
          description: API key retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      apiKey:
                        type: string
                        example: AIzaSyB41DRUbKWJHPxaFjMAwdrzWzbVKartNGg
        500:
          description: Failed to get API key
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: API_KEY_ERROR
                      message:
                        type: string
                        example: Failed to get Google Maps API key
                      details:
                        type: string
